<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitz's World Cup 2026 Photo Booth</title>
    <style>
        :root {
            --pitch-green: #1e5a38;
            --stadium-dark: #0d2619;
            --gold: #f1c40f;
            --white: #ffffff;
            --booth-red: #e74c3c;
            --print-blue: #3498db;
        }

        body {
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            background: radial-gradient(circle, #1e5a38 0%, var(--stadium-dark) 100%);
            font-family: 'Impact', 'Arial Black', sans-serif;
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            text-transform: uppercase;
            font-size: 2.3rem;
            margin: 5px 0 15px 0;
            text-shadow: 3px 3px 0px #000;
            letter-spacing: 1px;
            text-align: center;
        }

        .booth-widescreen-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
            max-width: 960px;
            width: 100%;
            margin-bottom: 20px;
        }

        .booth-box {
            position: relative;
            width: 640px;
            height: 480px;
            border: 10px solid #fff;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            background-color: #111;
            overflow: hidden;
            flex-shrink: 0;
        }

        #webcam { 
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }

        #boothCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .right-sidebar-controls {
            display: flex;
            flex-direction: column;
            width: 260px;
            gap: 12px;
        }

        .section-title {
            margin: 0 0 3px 0;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px #000;
        }

        /* Green Screen Slider Controls Container */
        .chroma-controls {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            font-family: sans-serif;
            font-size: 0.85rem;
        }
        .chroma-controls label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .chroma-controls input {
            width: 100%;
            margin-bottom: 8px;
        }

        .frame-selectors {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 240px;
            overflow-y: auto; /* Adds scrolling if you add tons of frames! */
            padding-right: 4px;
        }

        .frame-btn {
            background: #222;
            color: #fff;
            border: 3px solid #555;
            padding: 8px 10px;
            font-family: 'Impact', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            -webkit-tap-highlight-color: transparent;
        }

        .frame-btn:hover { border-color: var(--gold); }
        .frame-btn.active {
            background: var(--gold);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 10px var(--gold);
        }

        .snap-btn {
            background: linear-gradient(180deg, var(--booth-red) 0%, #c0392b 100%);
            border: 4px solid #fff;
            color: white;
            padding: 12px 20px;
            font-size: 1.3rem;
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }

        .snap-btn:active { transform: scale(0.95); }
        .snap-btn:disabled { background: #7f8c8d; cursor: not-allowed; opacity: 0.7; }

        .print-overlay-box {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(13, 38, 25, 0.95);
            z-index: 30;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            box-sizing: border-box;
        }

        .print-sidebar-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 220px;
        }

        .print-btn {
            background: linear-gradient(180deg, var(--print-blue) 0%, #2980b9 100%);
            border: 4px solid #fff;
            color: white;
            padding: 15px 20px;
            font-size: 1.4rem;
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            text-align: center;
        }

        .reset-btn {
            background: #7f8c8d;
            border: 2px solid #fff;
            color: white;
            padding: 10px 15px;
            font-size: 1rem;
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
        }

        #printPreviewImg {
            height: 440px;
            width: auto;
            border: 5px solid white;
            border-radius: 4px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }

        #statusFeedback {
            font-size: 1.05rem;
            color: var(--gold);
            text-shadow: 1px 1px 0 #000;
            min-height: 1.4em;
            font-family: sans-serif;
        }

        #countdown {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 9rem;
            color: var(--gold);
            text-shadow: 6px 6px 0px #000;
            display: none;
            z-index: 10;
        }

        #flashLayer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; pointer-events: none; z-index: 20;
        }
        .flash-trigger { animation: suddenFlash 0.3s ease-out; }
        @keyframes suddenFlash { 0% { opacity: 1; } 100% { opacity: 0; } }

        #stitchCanvas, #processingCanvas { display: none; }

        @media print {
            body, html, h1, .booth-widescreen-layout, .right-sidebar-controls, .section-title, .print-sidebar-actions {
                display: none !important;
            }
            .booth-box {
                border: none !important; box-shadow: none !important; background: none !important;
                width: auto !important; height: auto !important;
            }
            .print-overlay-box {
                display: block !important; background: none !important;
                position: absolute; top: 0; left: 0; padding: 0 !important; margin: 0 !important;
            }
            #printPreviewImg {
                max-height: 100vh !important; width: auto !important;
                border: none !important; box-shadow: none !important;
            }
        }
    </style>
</head>
<body>

    <h1>⚽ FITZ'S 8th BIRTHDAY BOOTH 🏆</h1>

    <div class="booth-widescreen-layout">
        
        <!-- MAIN BOOTH INTERFACE BOX -->
        <div class="booth-box">
            <video id="webcam" autoplay playsinline muted webkit-playsinline></video>
            <canvas id="boothCanvas" width="640" height="480"></canvas>
            <div id="countdown">3</div>
            <div id="flashLayer"></div>

            <!-- MODAL OVERLAY -->
            <div class="print-overlay-box" id="printZone">
                <div>
                    <img id="printPreviewImg" src="" alt="Photo Strip Preview">
                </div>
                <div class="print-sidebar-actions">
                    <button class="print-btn" onclick="triggerPrinter()">🖨️ Print Strip!</button>
                    <button class="reset-btn" onclick="closePrintZone()">⚽ Take Another!</button>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDEBAR MENU CONTROLS -->
        <div class="right-sidebar-controls">
            
            <!-- GREEN SCREEN CALIBRATION -->
            <div class="section-title">Green Screen Tuning:</div>
            <div class="chroma-controls">
                <label>Sensitivity: <span id="sensVal">100</span></label>
                <input type="range" id="chromaSensitivity" min="30" max="180" value="100" oninput="document.getElementById('sensVal').innerText=this.value">
            </div>

            <div class="section-title">Select Theme Background:</div>
            <div class="frame-selectors">
                <!-- Happy Birthday is now at the top and active by default -->
                <button class="frame-btn active" id="btn-birthday" onclick="selectFrame('birthday', event)">🎉 Happy Birthday Fitz!</button>
                <button class="frame-btn" onclick="selectFrame('worldcup', event)">🏆 World Cup Let's Go!</button>
                <button class="frame-btn" onclick="selectFrame('usa', event)">🇺🇸 USA Panini Card</button>
                <button class="frame-btn" onclick="selectFrame('mexico', event)">🇲🇽 Mexico Panini Card</button>
                <button class="frame-btn" onclick="selectFrame('argentina', event)">🇦🇷 Argentina Panini Card</button>
                <button class="frame-btn" onclick="selectFrame('yr2026', event)">🏁 2026 Grid Border</button>
                
                <!-- 🆕 EASY SLOTS TO ADD MORE FRAMES LATER: -->
                <!-- 
                <button class="frame-btn" onclick="selectFrame('stadium', event)">🏟️ Packed Stadium</button>
                <button class="frame-btn" onclick="selectFrame('trophy', event)">🥇 Golden Trophy Room</button>
                -->
            </div>

            <button class="snap-btn" id="snapBtn" onclick="startPhotoSequence()">Take 3-Shot Strip!</button>
            <div id="statusFeedback">Loading custom graphics...</div>
        </div>

    </div>

    <!-- Hidden workspace canvases used for background math processing -->
    <canvas id="processingCanvas" width="640" height="480"></canvas>
    <canvas id="stitchCanvas" width="360" height="1080"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const liveCanvas = document.getElementById('boothCanvas');
        const liveCtx = liveCanvas.getContext('2d');
        
        const processingCanvas = document.getElementById('processingCanvas');
        const procCtx = processingCanvas.getContext('2d');
        
        const stitchCanvas = document.getElementById('stitchCanvas');
        const stitchCtx = stitchCanvas.getContext('2d');
        
        const snapBtn = document.getElementById('snapBtn');
        const statusFeedback = document.getElementById('statusFeedback');
        const countdownDiv = document.getElementById('countdown');
        const flashLayer = document.getElementById('flashLayer');
        const printZone = document.getElementById('printZone');
        const printPreviewImg = document.getElementById('printPreviewImg');
        const chromaSlider = document.getElementById('chromaSensitivity');

        // Changed default target layout key to 'birthday'
        let currentFrame = 'birthday';
        let capturedFrames = [];

        // Paths to background templates. 
        // TIP: With green screen active, these should be solid full-bleed imagery 
        // because the user will be keying directly right into them!
        const frames = {
            birthday: new Image(),
            worldcup: new Image(),
            usa: new Image(),
            mexico: new Image(),
            argentina: new Image(),
            yr2026: new Image()
            // To add a new image file, define its tracking hook here:
            // stadium: new Image()
        };

        frames.birthday.src = 'Happy Birthday.png';
        frames.worldcup.src = 'World Cup.png';
        frames.usa.src = 'USA Panini.png';
        frames.mexico.src = 'Mexico Panini.png';
        frames.argentina.src = 'Argentina Panini.png';
        frames.yr2026.src = '2026.png';
        // Match your new tracking hook to the local asset filename:
        // frames.stadium.src = 'Packed Stadium.png';

        function selectFrame(frameId, e) {
            currentFrame = frameId;
            document.querySelectorAll('.frame-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
        }

        async function startCamera() {
            try {
                const constraints = {
                    audio: false,
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
                statusFeedback.innerText = "Stadium ready! Green screen activated.";
                requestAnimationFrame(renderLoop);
            } catch (err) {
                statusFeedback.innerText = "⚠️ Camera blocked.";
                console.error(err);
            }
        }

        // 🟢 THE GREEN SCREEN ENGINE
        function computeChromaKey() {
            // 1. Draw raw camera input flipped horizontally into hidden workspace canvas
            procCtx.save();
            procCtx.translate(processingCanvas.width, 0);
            procCtx.scale(-1, 1);
            procCtx.drawImage(video, 0, 0, processingCanvas.width, processingCanvas.height);
            procCtx.restore();

            // 2. Extract image pixel color arrays
            const frameData = procCtx.getImageData(0, 0, processingCanvas.width, processingCanvas.height);
            const l = frameData.data.length / 4;
            const threshold = Number(chromaSlider.value);

            // 3. Loop over every single pixel checking RGB channel values
            for (let i = 0; i < l; i++) {
                const r = frameData.data[i * 4 + 0];
                const g = frameData.data[i * 4 + 1];
                const b = frameData.data[i * 4 + 2];

                // If pixel has highly dominant green parameters, reduce opacity alpha value entirely to 0
                if (g > r + (threshold / 3) && g > b + (threshold / 3)) {
                    frameData.data[i * 4 + 3] = 0; 
                }
            }
            return frameData;
        }

        function renderLoop() {
            liveCtx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);

            // 1. Draw the chosen background template layout down first
            const activeImage = frames[currentFrame];
            if (activeImage.complete && activeImage.naturalWidth !== 0) {
                liveCtx.drawImage(activeImage, 0, 0, liveCanvas.width, liveCanvas.height);
            } else {
                liveCtx.fillStyle = "#111";
                liveCtx.fillRect(0, 0, liveCanvas.width, liveCanvas.height);
            }

            // 2. Layer the processed green-screened user over the background image
            if (video.readyState >= 2) {
                const keyedSublayer = computeChromaKey();
                
                // Use a temporary canvas frame payload to handle pixel layering transparency smoothly
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 640;
                tempCanvas.height = 480;
                tempCanvas.getContext('2d').putImageData(keyedSublayer, 0, 0);
                
                liveCtx.drawImage(tempCanvas, 0, 0);
            }

            requestAnimationFrame(renderLoop);
        }

        async function startPhotoSequence() {
            if (video.readyState < 2) return;
            snapBtn.disabled = true;
            printZone.style.display = 'none'; 
            capturedFrames = [];

            await takeSinglePhoto(1);
            await takeSinglePhoto(2);
            await takeSinglePhoto(3);

            statusFeedback.innerText = "Processing layouts...";
            generateFinalStrip();
            
            statusFeedback.innerText = "Ready!";
            snapBtn.disabled = false;
        }

        function takeSinglePhoto(photoNumber) {
            return new Promise((resolve) => {
                statusFeedback.innerText = `Get ready for Photo ${photoNumber}!`;
                let currentCount = 3;
                countdownDiv.innerText = currentCount;
                countdownDiv.style.display = 'block';

                const timerInterval = setInterval(() => {
                    currentCount--;
                    if (currentCount > 0) {
                        countdownDiv.innerText = currentCount;
                    } else {
                        clearInterval(timerInterval);
                        countdownDiv.style.display = 'none';
                        
                        flashLayer.classList.add('flash-trigger');
                        setTimeout(() => flashLayer.classList.remove('flash-trigger'), 300);

                        const tempImg = new Image();
                        tempImg.src = liveCanvas.toDataURL('image/png');
                        tempImg.onload = () => {
                            capturedFrames.push(tempImg);
                            setTimeout(resolve, 1200); 
                        };
                    }
                }, 1000);
            });
        }

        function generateFinalStrip() {
            const stripW = 360;  
            const targetPhotoH = 270; 
            const gap = 20;     
            const headerH = 100; 
            const footerH = 90;  

            const totalH = headerH + (targetPhotoH * 3) + (gap * 2) + footerH;
            stitchCanvas.height = totalH;
            stitchCanvas.width = stripW;

            stitchCtx.fillStyle = "#ffffff";
            stitchCtx.fillRect(0, 0, stripW, totalH);

            capturedFrames.forEach((img, index) => {
                const yOffset = headerH + (index * (targetPhotoH + gap));
                const photoW = stripW - 40; 
                const photoX = 20;
                stitchCtx.drawImage(img, 0, 0, 640, 480, photoX, yOffset, photoW, targetPhotoH);
                
                stitchCtx.strokeStyle = "#111111";
                stitchCtx.lineWidth = 4;
                stitchCtx.strokeRect(photoX, yOffset, photoW, targetPhotoH);
            });

            stitchCtx.fillStyle = "#222222";
            stitchCtx.textAlign = "center";
            stitchCtx.font = "bold 26px Impact, sans-serif";
            stitchCtx.fillText("⚽ WORLD CUP 🏆", stripW / 2, 45);
            stitchCtx.font = "20px Impact, sans-serif";
            stitchCtx.fillText("CHAMPIONSHIP STRIP", stripW / 2, 75);

            stitchCtx.fillStyle = "#1e5a38"; 
            stitchCtx.fillRect(0, totalH - footerH, stripW, footerH);
            
            stitchCtx.fillStyle = "#f1c40f";
            stitchCtx.fillRect(0, totalH - footerH, stripW, 5);

            stitchCtx.fillStyle = "#ffffff";
            stitchCtx.strokeStyle = "#000000";
            stitchCtx.lineWidth = 4;
            stitchCtx.textAlign = "center";
            stitchCtx.font = "bold 24px Impact, sans-serif";
            
            stitchCtx.strokeText("HAPPY 8th BIRTHDAY FITZ!", stripW / 2, totalH - 36);
            stitchCtx.fillText("HAPPY 8th BIRTHDAY FITZ!", stripW / 2, totalH - 36);

            const dataUrl = stitchCanvas.toDataURL('image/png');
            printPreviewImg.src = dataUrl;
            printZone.style.display = 'flex'; 

            const autoLink = document.createElement('a');
            autoLink.href = dataUrl;
            autoLink.download = `world_cup_strip_${Date.now()}.png`;
            document.body.appendChild(autoLink);
            autoLink.click();
            document.body.removeChild(autoLink);
        }

        function triggerPrinter() { window.print(); }
        function closePrintZone() {
            printZone.style.display = 'none';
            statusFeedback.innerText = "Ready for the next match!";
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
