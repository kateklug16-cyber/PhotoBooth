<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitz's Birthday Booth</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        #booth-container { position: relative; width: 640px; height: 480px; border: 5px solid #fff; }
        #boothCanvas { width: 100%; height: 100%; }
        .controls { margin-top: 20px; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="booth-container">
        <video id="webcam" autoplay playsinline style="display:none;"></video>
        <canvas id="boothCanvas" width="640" height="480"></canvas>
    </div>

    <div class="controls">
        <button id="snapBtn" onclick="startSequence()">SNAP 3 PHOTOS</button>
        <button onclick="openAdmin()">PRINT QUEUE</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('boothCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = new Image(); 
        overlay.src = 'Happy Birthday.png'; // Make sure this is exactly right!

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                requestAnimationFrame(draw);
            } catch (e) { alert("Camera Error: " + e); }
        }

        function draw() {
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -640, 0, 640, 480);
            ctx.restore();
            // Draw overlay directly
            if(overlay.complete) ctx.drawImage(overlay, 0, 0, 640, 480);
            requestAnimationFrame(draw);
        }

        async function startSequence() {
            document.getElementById('snapBtn').disabled = true;
            let frames = [];
            for(let i=0; i<3; i++) {
                alert("Taking shot " + (i+1));
                await new Promise(r => setTimeout(r, 1000));
                frames.push(canvas.toDataURL('image/jpeg', 0.8)); // Use JPEG for smaller size
            }
            alert("Done! Creating your strip...");
            // Build the strip here...
            document.getElementById('snapBtn').disabled = false;
        }

        init();
    </script>
</body>
</html>
