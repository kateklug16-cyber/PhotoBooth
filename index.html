<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitz's World Cup 2026 Photo Booth</title>
    <style>
        :root {
            --pitch-green: #1e5a38;
            --stadium-dark: #0d2619;
            --gold: #f1c40f;
            --white: #ffffff;
            --booth-red: #e74c3c;
            --print-blue: #3498db;
        }

        body {
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            background: radial-gradient(circle, #1e5a38 0%, var(--stadium-dark) 100%);
            font-family: 'Impact', 'Arial Black', sans-serif;
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            text-transform: uppercase;
            font-size: 2.1rem;
            margin: 5px 0 15px 0;
            text-shadow: 3px 3px 0px #000;
            letter-spacing: 1px;
            text-align: center;
        }

        .booth-widescreen-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
            max-width: 960px;
            width: 100%;
            margin-bottom: 20px;
        }

        .booth-box {
            position: relative;
            width: 640px;
            height: 480px;
            border: 10px solid #fff;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            background-color: #111;
            overflow: hidden;
            flex-shrink: 0;
        }

        #webcam { 
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }

        #boothCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .right-sidebar-controls {
            display: flex;
            flex-direction: column;
            width: 260px;
            gap: 15px;
        }

        .section-title {
            margin: 0 0 5px 0;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px #000;
        }

        .frame-selectors {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
        }

        .frame-btn {
            background: #222;
            color: #fff;
            border: 3px solid #555;
            padding: 10px 12px;
            font-family: 'Impact', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            -webkit-tap-highlight-color: transparent;
        }

        .frame-btn:hover { border-color: var(--gold); }
        .frame-btn.active {
            background: var(--gold);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 12px var(--gold);
        }

        .snap-btn {
            background: linear-gradient(180deg, var(--booth-red) 0%, #c0392b 100%);
            border: 4px solid #fff;
            color: white;
            padding: 15px 20px;
            font-size: 1.4rem;
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }

        .snap-btn:active { transform: scale(0.95); }
        .snap-btn:disabled { background: #7f8c8d; cursor: not-allowed; opacity: 0.7; }

        /* POPUP OVERLAY PANEL */
        .print-overlay-box {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(13, 38, 25, 0.98);
            z-index: 30;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px;
            box-sizing: border-box;
        }

        .print-sidebar-actions {
            display: flex;
            flex-direction: row;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .action-btn {
            background: linear-gradient(180deg, var(--print-blue) 0%, #2980b9 100%);
            border: 3px solid #fff;
            color: white;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .reset-btn {
            background: #7f8c8d;
            border: 2px solid #fff;
            color: white;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
        }

        /* SCREEN PREVIEW CONSTRAINTS */
        #iosPrintTarget {
            display: block;
            max-height: 330px; 
            width: auto;
            border: 5px solid white;
            border-radius: 4px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
            background: white;
        }

        #hiddenStitchCanvas { display: none; }

        #statusFeedback {
            font-size: 1.1rem;
            color: var(--gold);
            text-shadow: 1px 1px 0 #000;
            min-height: 1.4em;
            font-family: sans-serif;
            font-weight: bold;
        }

        #countdown {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 9rem;
            color: var(--gold);
            text-shadow: 6px 6px 0px #000;
            display: none;
            z-index: 10;
        }

        #flashLayer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; pointer-events: none; z-index: 20;
        }
        .flash-trigger { animation: suddenFlash 0.3s ease-out; }
        @keyframes suddenFlash { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <h1>⚽ FITZ'S 8th BIRTHDAY BOOTH 🏆</h1>

    <div class="booth-widescreen-layout">
        
        <div class="booth-box">
            <video id="webcam" autoplay playsinline muted webkit-playsinline></video>
            <canvas id="boothCanvas" width="640" height="480"></canvas>
            <div id="countdown">3</div>
            <div id="flashLayer"></div>

            <div class="print-overlay-box" id="printZone">
                
                <img id="iosPrintTarget" alt="Twin 4x6 Photo Strip Sheet">
                
                <div class="print-sidebar-actions">
                    <a id="downloadLink" class="action-btn" download="fitz-birthday-strip.png">💾 Save Photo Strip</a>
                    <button class="reset-btn" onclick="closePrintZone()">⚽ Next Player!</button>
                </div>
            </div>
        </div>

        <div class="right-sidebar-controls">
            <div class="section-title">Select Card / Border:</div>
            <div class="frame-selectors">
                <button class="frame-btn active" id="btn-birthday" onclick="selectFrame('birthday', event)">🎉 Happy Birthday Fitz!</button>
                <button class="frame-btn" onclick="selectFrame('worldcup', event)">🏆 World Cup Let's Go!</button>
                <button class="frame-btn" onclick="selectFrame('usa', event)">🇺🇸 USA Panini Card</button>
                <button class="frame-btn" onclick="selectFrame('mexico', event)">🇲🇽 Mexico Panini Card</button>
                <button class="frame-btn" onclick="selectFrame('argentina', event)">🇦🇷 Argentina Panini Card</button>
                <button class="frame-btn" onclick="selectFrame('yr2026', event)">🏁 2026 Grid Border</button>
            </div>

            <button class="snap-btn" id="snapBtn" onclick="startPhotoSequence()">Take 3-Shot Strip!</button>
            <div id="statusFeedback">Ready for action!</div>
        </div>

    </div>

    <canvas id="hiddenStitchCanvas" width="1200" height="800"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const liveCanvas = document.getElementById('boothCanvas');
        const liveCtx = liveCanvas.getContext('2d');
        const hiddenStitchCanvas = document.getElementById('hiddenStitchCanvas');
        const stitchCtx = hiddenStitchCanvas.getContext('2d');
        const iosPrintTarget = document.getElementById('iosPrintTarget');
        const downloadLink = document.getElementById('downloadLink');
        
        const snapBtn = document.getElementById('snapBtn');
        const statusFeedback = document.getElementById('statusFeedback');
        const countdownDiv = document.getElementById('countdown');
        const flashLayer = document.getElementById('flashLayer');
        const printZone = document.getElementById('printZone');

        let currentFrame = 'birthday';
        let capturedFrames = [];

        const frames = {
            birthday: new Image(),
            worldcup: new Image(),
            usa: new Image(),
            mexico: new Image(),
            argentina: new Image(),
            yr2026: new Image()
        };

        frames.birthday.src = 'Happy Birthday.png';
        frames.worldcup.src = 'World Cup.png';
        frames.usa.src = 'USA Panini.png';
        frames.mexico.src = 'Mexico Panini.png';
        frames.argentina.src = 'Argentina Panini.png';
        frames.yr2026.src = '2026.png';

        function selectFrame(frameId, e) {
            currentFrame = frameId;
            document.querySelectorAll('.frame-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
        }

        async function startCamera() {
            try {
                const constraints = {
                    audio: false,
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
                statusFeedback.innerText = "Ready for the match!";
                requestAnimationFrame(renderLoop);
            } catch (err) {
                statusFeedback.innerText = "⚠️ Camera blocked.";
                console.error(err);
            }
        }

        function renderLoop() {
            liveCtx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);
            liveCtx.save();
            liveCtx.translate(liveCanvas.width, 0);
            liveCtx.scale(-1, 1);
            
            if (video.readyState >= 2) { 
                liveCtx.drawImage(video, 0, 0, liveCanvas.width, liveCanvas.height);
            } else {
                liveCtx.fillStyle = "#111";
                liveCtx.fillRect(0, 0, liveCanvas.width, liveCanvas.height);
            }
            liveCtx.restore();

            const activeImage = frames[currentFrame];
            if (activeImage.complete && activeImage.naturalWidth !== 0) {
                liveCtx.drawImage(activeImage, 0, 0, liveCanvas.width, liveCanvas.height);
            }
            requestAnimationFrame(renderLoop);
        }

        async function startPhotoSequence() {
            if (video.readyState < 2) return;
            snapBtn.disabled = true;
            capturedFrames = [];

            await takeSinglePhoto(1);
            await takeSinglePhoto(2);
            await takeSinglePhoto(3);

            statusFeedback.innerText = "Processing double strip layout...";
            generateTwin4x6Sheet();
            
            statusFeedback.innerText = "Strip compiled!";
            snapBtn.disabled = false;
        }

        function takeSinglePhoto(photoNumber) {
            return new Promise((resolve) => {
                statusFeedback.innerText = `📸 Shot ${photoNumber} of 3 incoming!`;
                let currentCount = 3;
                countdownDiv.innerText = currentCount;
                countdownDiv.style.display = 'block';

                const timerInterval = setInterval(() => {
                    currentCount--;
                    if (currentCount > 0) {
                        countdownDiv.innerText = currentCount;
                    } else {
                        clearInterval(timerInterval);
                        countdownDiv.style.display = 'none';
                        
                        flashLayer.classList.add('flash-trigger');
                        setTimeout(() => flashLayer.classList.remove('flash-trigger'), 300);

                        const tempImg = new Image();
                        tempImg.src = liveCanvas.toDataURL('image/png');
                        tempImg.onload = () => {
                            capturedFrames.push(tempImg);
                            setTimeout(resolve, 1200); 
                        };
                    }
                }, 1000);
            });
        }

        function buildSingleStrip() {
            const stripW = 360;  
            const targetPhotoH = 270; 
            const gap = 20;     
            const headerH = 100; 
            const footerH = 90;  
            const totalH = headerH + (targetPhotoH * 3) + (gap * 2) + footerH;

            const stripCanvas = document.createElement('canvas');
            stripCanvas.width = stripW;
            stripCanvas.height = totalH;
            const ctx = stripCanvas.getContext('2d');

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, stripW, totalH);

            capturedFrames.forEach((img, index) => {
                const yOffset = headerH + (index * (targetPhotoH + gap));
                const photoW = stripW - 40; 
                const photoX = 20;
                ctx.drawImage(img, 0, 0, 640, 480, photoX, yOffset, photoW, targetPhotoH);
                
                ctx.strokeStyle = "#111111";
                ctx.lineWidth = 4;
                ctx.strokeRect(photoX, yOffset, photoW, targetPhotoH);
            });

            ctx.fillStyle = "#222222";
            ctx.textAlign = "center";
            ctx.font = "bold 26px Impact, sans-serif";
            ctx.fillText("⚽ WORLD CUP 🏆", stripW / 2, 45);
            ctx.font = "20px Impact, sans-serif";
            ctx.fillText("CHAMPIONSHIP STRIP", stripW / 2, 75);

            ctx.fillStyle = "#1e5a38"; 
            ctx.fillRect(0, totalH - footerH, stripW, footerH);
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(0, totalH - footerH, stripW, 5);

            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 4;
            ctx.textAlign = "center";
            ctx.font = "bold 24px Impact, sans-serif";
            ctx.strokeText("HAPPY 8th BIRTHDAY FITZ!", stripW / 2, totalH - 36);
            ctx.fillText("HAPPY 8th BIRTHDAY FITZ!", stripW / 2, totalH - 36);

            return stripCanvas;
        }

        function generateTwin4x6Sheet() {
            stitchCtx.fillStyle = "#ffffff"; 
            stitchCtx.fillRect(0, 0, 1200, 800);

            const singleStripElement = buildSingleStrip();

            const finalStripW = 247; 
            const finalStripH = 740;
            const topY = 30;

            const leftStripX = 345; 
            const rightStripX = 597; 

            stitchCtx.drawImage(singleStripElement, 0, 0, singleStripElement.width, singleStripElement.height, leftStripX, topY, finalStripW, finalStripH);
            stitchCtx.drawImage(singleStripElement, 0, 0, singleStripElement.width, singleStripElement.height, rightStripX, topY, finalStripW, finalStripH);

            const finalDataUrl = hiddenStitchCanvas.toDataURL('image/png');
            
            // Set source for visual on-screen preview
            iosPrintTarget.src = finalDataUrl;
            
            // 🌟 FORCE SAFARI DOWNLOAD HOOK
            downloadLink.href = finalDataUrl;

            printZone.style.display = 'flex'; 
        }
        
        function closePrintZone() {
            printZone.style.display = 'none';
            iosPrintTarget.src = "";
            downloadLink.href = "#";
            statusFeedback.innerText = "Ready for the next match!";
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
